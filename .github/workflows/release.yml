name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Check version consistency
        run: npm run check:version

      - name: Build frontend
        run: npm run build

      - name: Check Rust
        run: cargo check --manifest-path src-tauri\Cargo.toml -j 1

      - name: Run Rust usage/cost tests
        run: npm run test:rust

      - name: Run UI smoke screenshots
        run: npm run test:ui

      - name: Build Tauri bundles
        run: npm run tauri:build

      - name: Verify installer artifacts
        shell: powershell
        run: |
          $assets = @(
            Get-ChildItem 'src-tauri\target\release\bundle\nsis\*.exe'
          )
          if ($assets.Count -lt 1) { throw "Expected NSIS installer artifact, found $($assets.Count)." }
          foreach ($asset in $assets) {
            if ($asset.Length -le 0) { throw "Installer artifact is empty: $($asset.FullName)" }
            Write-Host "$($asset.Name) $($asset.Length) bytes"
          }

      - name: Generate checksums
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          $assets = @(
            Get-ChildItem 'src-tauri\target\release\bundle\nsis\*.exe'
          )
          foreach ($asset in $assets) {
            Copy-Item $asset.FullName dist-release\
          }
          Get-FileHash dist-release\* | ForEach-Object { "$($_.Hash)  $(Split-Path $_.Path -Leaf)" } | Out-File -Encoding utf8 dist-release\SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-hud-one-${{ github.ref_name }}
          path: dist-release/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
